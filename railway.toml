# Railway deployment config — ig-posting-pipeline service
# Cron runs twice per week (Mon & Thu 15:00 UTC (evening in Middle East/South Asia, peak Islamic engagement))

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python src/main.py"
cronSchedule = "0 15 * * 1,4"
restartPolicyType = "NEVER"
