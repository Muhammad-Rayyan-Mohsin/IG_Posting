# Railway deployment config — ig-posting-pipeline service
# Cron runs twice per week (Mon + Thu 06:00 UTC) matching Render schedule.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python src/main.py"
# TEMPORARY: fire at 23:42 UTC tonight for prod smoke test. Will be reverted
# to "0 6 * * 1,4" (Mon + Thu 06:00 UTC) once the test run completes.
cronSchedule = "42 23 * * *"
restartPolicyType = "NEVER"
